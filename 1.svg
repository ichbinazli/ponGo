<div class="mb-8 text-center sm:text-left">
    <h1 class="text-2xl sm:text-3xl font-bold text-slate-100 mb-4" data-i18n="friends.title">Arkadaşlar</h1>
    <p class="text-slate-300 text-sm sm:text-base" data-i18n="friends.subtitle">Arkadaşlarınızı yönetin ve yeni oyuncularla bağlantı kurun.</p>
</div>

<div class="grid grid-cols-1 lg:grid-cols-12 gap-4 sm:gap-6 lg:gap-8">
    <div class="lg:col-span-8 space-y-4 sm:space-y-6">
        <div class="card">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-4">
                <h2 class="text-lg sm:text-xl font-bold text-slate-100" data-i18n="friends.allFriends">Tüm Arkadaşlar</h2>
                <span class="text-slate-400 text-sm" id="all-friends-count">0</span>
            </div>
            <div class="grid grid-cols-1 gap-3" id="all-friends-container">
                <p class="text-slate-500 text-sm text-center py-4" data-i18n="friends.noFriends">Henüz arkadaşınız yok</p>
            </div>
        </div>
    </div>
    
    <div class="lg:col-span-4 space-y-4 sm:space-y-6">
        <div class="card">
            <h3 class="text-base sm:text-lg font-bold text-slate-100 mb-4" data-i18n="friends.addFriend">Arkadaş Ekle</h3>
            <div class="space-y-3">
                <div class="relative" id="search-wrapper">
                    <input 
                        type="text" 
                        placeholder="Kullanıcı adı ara..." 
                        id="friend-search-input"
                        data-i18n-placeholder="friends.searchPlaceholder"
                        class="w-full px-4 py-2.5 sm:py-3 bg-slate-800/50 border border-slate-700 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all text-sm sm:text-base"
                        autocomplete="off"
                        minlength="2"
                    >
                    <div class="absolute right-3 top-1/2 transform -translate-y-1/2 text-slate-500" id="search-icon">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <div class="absolute right-3 top-1/2 transform -translate-y-1/2 hidden" id="search-spinner">
                        <svg class="animate-spin h-5 w-5 text-cyan-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </div>
                    <div class="absolute z-50 w-full mt-1 bg-slate-800 border border-slate-700 rounded-lg shadow-xl max-h-64 overflow-y-auto hidden" id="search-results-dropdown">
                    </div>
                </div>
                <p class="text-slate-500 text-xs" id="search-hint" data-i18n="friends.searchHint">En az 2 karakter yazın</p>
                <p class="text-red-400 text-xs hidden" id="search-error"></p>
            </div>
            
            <div class="mt-6">
                <h4 class="text-slate-300 text-sm font-semibold mb-3 flex items-center justify-between">
                    <span data-i18n="friends.requests">Arkadaş İstekleri</span>
                    <span class="bg-cyan-500/20 text-cyan-400 text-xs px-2 py-0.5 rounded-full" id="friend-requests-count">0</span>
                </h4>
                <div class="space-y-2" id="friend-requests-container">
                    <p class="text-slate-500 text-xs text-center py-2" data-i18n="friends.noRequests">Bekleyen istek yok</p>
                </div>
            </div>

            <div class="mt-6">
                <h4 class="text-slate-300 text-sm font-semibold mb-3 flex items-center justify-between">
                    <span data-i18n="friends.sentRequests">Gönderilen İstekler</span>
                    <span class="bg-violet-500/20 text-violet-400 text-xs px-2 py-0.5 rounded-full" id="sent-requests-count">0</span>
                </h4>
                <div class="space-y-2" id="sent-requests-container">
                    <p class="text-slate-500 text-xs text-center py-2" data-i18n="friends.noSentRequests">Gönderilen istek yok</p>
                </div>
            </div>
        </div>
    </div>
</div>            <!-- Gönderilen İstekler -->
