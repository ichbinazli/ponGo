<div class="max-w-2xl mx-auto">
    <div class="text-center mb-8">
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold bg-gradient-to-r from-cyan-400 via-blue-400 to-purple-400 bg-clip-text text-transparent mb-2">
            PONGARCADE
        </h1>
        <p class="text-slate-400 text-sm sm:text-base tracking-wide uppercase">
            Turnuva Modu
        </p>
    </div>

    <div class="card bg-slate-800/80 backdrop-blur-sm border border-slate-700/50">

            <h2 class="text-xl sm:text-2xl font-bold text-cyan-400">Oyuncu Kayıt</h2>
        </div>
        
        <div class="flex gap-3 mb-6">
            <input 
                type="text" 
                placeholder="Takma adınızı girin..." 
                id="player-alias-input"
                class="flex-1 px-4 py-3 bg-slate-900/60 border border-slate-600 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all"
                maxlength="20"
            >
            <button 
                id="add-player-btn"
                class="bg-cyan-500 hover:bg-cyan-600 text-white font-semibold px-6 py-3 rounded-lg transition-all duration-200 hover:scale-105 active:scale-95"
            >
                +
            </button>
        </div>
        
        <div class="space-y-3 mb-8" id="player-list">
        </div>
                <div class="space-y-4">
            <button 
                id="start-tournament-btn"
                class="w-full bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-600 hover:to-purple-700 text-white font-bold py-4 rounded-lg transition-all duration-300 hover:scale-105 active:scale-95 disabled:opacity-50 disabled:hover:scale-100 disabled:cursor-not-allowed"
                disabled
            >
                TURNUVAYI BAŞLAT
            </button>
        </div>
    </div>
    
    <div class="mt-8 text-center">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
            <div class="card bg-slate-800/40 text-center py-4">
                <div class="text-2xl mb-2"></div>
                <div class="text-sm text-slate-400">Turnuva Türü</div>
                <div class="text-lg font-bold text-cyan-400">Elemeli Sistem</div>
            </div>
            <div class="card bg-slate-800/40 text-center py-4">
                <div class="text-2xl mb-2"></div>
                <div class="text-sm text-slate-400">Oyuncular</div>
                <div class="text-lg font-bold text-purple-400"><span id="player-count">0</span>/8</div>
            </div>
            <div class="card bg-slate-800/40 text-center py-4">
                <div class="text-2xl mb-2">⏱</div>
                <div class="text-sm text-slate-400">Maç Süresi</div>
                <div class="text-lg font-bold text-amber-400">3'te 2 Galibiyet</div>
            </div>
        </div>
        
        <div class="text-xs text-slate-500">
             Turnuva başlatmak için en az 2 oyuncu gereklidir
        </div>
    </div>
</div>

    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(71, 85, 105, 0.3);
    border-radius: 8px;
    padding: 12px 16px;
    transition: all 0.2s ease;
}

.player-item:hover {
    background: rgba(15, 23, 42, 0.8);
    border-color: rgba(6, 182, 212, 0.3);
}

.player-number {
    color: #6b7280;
    font-weight: 600;
    margin-right: 12px;
}

.player-alias {
    color: #f1f5f9;
    flex-grow: 1;
    font-weight: 500;
}

.remove-player-btn {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
    border: none;
    border-radius: 6px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
}

    background: rgba(239, 68, 68, 0.4);
    transform: scale(1.1);
}

            </div>
        </div>
