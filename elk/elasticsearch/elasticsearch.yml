# ───────────────────────────────────────────────────────
# Elasticsearch Configuration - ft_transcendence
# ───────────────────────────────────────────────────────

cluster.name: ft-transcendence
node.name: es-node-01

# Network
network.host: 0.0.0.0
http.port: 9200

# Discovery (single node)
discovery.type: single-node

# Security - Development modunda kapalı
# Production'da açılacak + SSL sertifika gerekir
xpack.security.enabled: false

# Memory
indices.memory.index_buffer_size: 20%

# Disk Watermarks (Disk 92% dolu olduğu için toleransı artırıyoruz)
cluster.routing.allocation.disk.watermark.low: 95%
cluster.routing.allocation.disk.watermark.high: 97%
cluster.routing.allocation.disk.watermark.flood_stage: 99%

# Log ayarları
logger.level: warn
