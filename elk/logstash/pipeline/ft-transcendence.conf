# ─────────────────────────────────────────────────────────────────
# Logstash Pipeline - ft_transcendence
# Tüm Docker container loglarını işler ve Elasticsearch'e gönderir
# ─────────────────────────────────────────────────────────────────

input {
  # Filebeat'ten gelen loglar
  beats {
    port => 5044
  }
}

filter {
  # Docker JSON log formatını parse et
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Servis etiketine göre farklı filter uygula
  if [container][labels][service] == "backend" or [container][labels][com_docker_compose_service] == "backend" {
    mutate {
      add_field => { "service_name" => "backend" }
      add_tag => ["backend", "api"]
    }

    # Pino (Fastify logger) JSON loglarını parse et
    if [parsed] {
      mutate {
        add_field => {
          "log_level" => "%{[parsed][level]}"
          "log_msg"   => "%{[parsed][msg]}"
          "log_time"  => "%{[parsed][time]}"
          "req_method" => "%{[parsed][req][method]}"
          "req_url"    => "%{[parsed][req][url]}"
          "res_status" => "%{[parsed][res][statusCode]}"
          "res_time"   => "%{[parsed][responseTime]}"
        }
      }

      # HTTP hata kodlarını etiketle
      if [res_status] and [res_status] >= "400" {
        mutate { add_tag => ["http_error"] }
      }
      if [res_status] and [res_status] >= "500" {
        mutate { add_tag => ["http_server_error"] }
      }
    }
  }

  else if [container][labels][com_docker_compose_service] == "nginx" {
    mutate {
      add_field => { "service_name" => "nginx" }
      add_tag => ["nginx", "access"]
    }

    # Nginx JSON formatını parse et (nginx.conf'daki json_combined format)
    json {
      source => "message"
      target => "nginx_log"
      skip_on_invalid_json => true
    }

    if [nginx_log] {
      mutate {
        add_field => {
          "http_method"  => "%{[nginx_log][method]}"
          "http_uri"     => "%{[nginx_log][uri]}"
          "http_status"  => "%{[nginx_log][status]}"
          "response_time" => "%{[nginx_log][request_time]}"
          "client_ip"    => "%{[nginx_log][remote_addr]}"
        }
      }
    }
  }

  else if [container][labels][com_docker_compose_service] == "frontend" {
    mutate {
      add_field => { "service_name" => "frontend" }
      add_tag => ["frontend"]
    }
  }

  else if [container][labels][com_docker_compose_service] == "game" {
    mutate {
      add_field => { "service_name" => "game" }
      add_tag => ["game"]
    }
  }

  else {
    mutate {
      add_field => { "service_name" => "unknown" }
    }
  }

  # Genel metadata
  mutate {
    add_field => {
      "environment" => "production"
      "project"     => "ft_transcendence"
    }
  }

  # Gereksiz alanları temizle
  mutate {
    remove_field => ["agent", "ecs", "input", "log.offset"]
  }

  # Timestamp düzenle
  date {
    match => ["log_time", "UNIX_MS", "ISO8601"]
    target => "@timestamp"
    timezone => "UTC"
  }
}

output {
  # Elasticsearch'e gönder
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]

    # Her servis için ayrı index (günlük rotation)
    index => "ft-%{service_name}-%{+YYYY.MM.dd}"

    # ILM kapalı (xpack.security disabled ortamda desteklenmiyor)
    ilm_enabled => false

    # Template yönetimi
    manage_template => true
    template_name => "ft-transcendence"
    template_overwrite => true
  }

  # Debug için (production'da kapat)
  # stdout { codec => rubydebug }
}
