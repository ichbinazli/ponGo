<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifremi Unuttum</title>
    <link rel="stylesheet" href="css/password_forget.css">
</head>
<body>
    <!-- Animated background particles -->
    <div class="bg-particles"></div>

    <div class="header-bar">
        <div class="header-title">FT_TRANSCENDENCE</div>
    </div>
    <div class="form-container">
        <div class="form-header">
            <div class="icon-container">
                <div class="forgot-icon">🔐</div>
            </div>
            <h2>Şifremi Unuttum</h2>
            <p class="form-subtitle">E-posta adresinizi girin, şifre sıfırlama bağlantısı gönderelim</p>
        </div>

        <form class="forgot-form">
            <div class="input-group">
                <label for="email">E-posta Adresi</label>
                <input type="email" id="email" placeholder="E-posta adresinizi girin" required>
                <div class="input-line"></div>
            </div>

            <button type="submit" class="reset-btn">
                <span>Sıfırlama Bağlantısı Gönder</span>
                <div class="btn-effect"></div>
            </button>

            <div class="back-to-login">
                <a href="#" class="login-link" onclick="goBack()">← Giriş Sayfasına Dön</a>
            </div>
        </form>
