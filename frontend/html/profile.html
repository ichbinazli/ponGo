<div class="profile-section">
    <div class="profile-header">
        <div class="avatar-section">
            <div class="avatar-container" onclick="document.getElementById('avatar-input').click()">
                <img class="avatar-img hidden" id="avatar-img" alt="Avatar">
                <div class="avatar-placeholder" id="avatar-placeholder">👤</div>
            </div>
            <input type="file" id="avatar-input" class="hidden" accept="image/*">
            <button class="avatar-upload-btn" onclick="document.getElementById('avatar-input').click()">
                Avatar Değiştir
            </button>
        </div>
        
        <div class="profile-info">
            <h1 class="player-name" id="player-name">GameMaster_Pro</h1>
            
            <div class="level-container">
                <div class="level-badge" id="level-badge">Level 42</div>
                <div class="xp-bar">
                    <div class="xp-fill" id="xp-fill"></div>
                </div>
            </div>
            <div class="xp-text" id="xp-text">7,500 / 10,000 XP</div>
            
            <div class="profile-subinfo">
                🏆 Elite Oyuncu | Son giriş: 2 saat önce
            </div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="total-games">156</div>
            <div class="stat-label">Toplam Oyun</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="wins">124</div>
            <div class="stat-label">Kazanılan</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="win-rate">79%</div>
            <div class="stat-label">Kazanma Oranı</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="ranking">#23</div>
            <div class="stat-label">Sıralama</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="tournaments">8</div>
            <div class="stat-label">Turnuva Kazanması</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="playtime">247h</div>
            <div class="stat-label">Oyun Süresi</div>
        </div>
    </div>

    <div class="profile-form">
        <div class="form-group">
            <label class="form-label">Kullanıcı Adı</label>
            <input type="text" class="form-input" id="username" value="GameMaster_Pro">
        </div>
        <div class="form-group">
            <label class="form-label">E-posta</label>
            <input type="email" class="form-input" id="email" value="gamemaster@example.com">
        </div>
        <div class="form-group">
            <label class="form-label">Ad</label>
            <input type="text" class="form-input" id="firstname" value="Ahmet">
        </div>
        <div class="form-group">
            <label class="form-label">Soyad</label>
            <input type="text" class="form-input" id="lastname" value="Yılmaz">
        </div>
        <div class="form-group">
            <label class="form-label">Ülke</label>
            <input type="text" class="form-input" id="country" value="Türkiye">
        </div>
        <div class="form-group">
            <label class="form-label">Doğum Tarihi</label>
            <input type="date" class="form-input" id="birthdate" value="1995-05-15">
        </div>
        <div class="form-group full-width">
            <label class="form-label">Bio / Hakkımda</label>
            <textarea class="form-textarea" id="bio" placeholder="Kendiniz hakkında birkaç şey yazın...">Profesyonel oyuncu ve strateji uzmanı. Ft_transcendence'da 3 yıldır aktif olarak oynuyorum.</textarea>
        </div>
        <div class="form-group full-width">
            <label class="form-label">Favori Oyun Modu</label>
            <select class="form-input" id="gamemode">
                <option value="classic">Klasik</option>
                <option value="tournament" selected>Turnuva</option>
                <option value="ranked">Dereceli</option>
                <option value="casual">Arkadaş Maçı</option>
            </select>
        </div>
        
        <button class="save-btn" onclick="saveProfile()">Profili Kaydet</button>
    </div>
</div>
</div>
