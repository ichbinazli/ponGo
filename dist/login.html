<div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full">
            <!-- Logo/Brand Section -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white mb-2">ft_transcendence</h1>
                <p class="text-slate-400">Oyun dünyasına hoş geldiniz</p>
            </div>

            <!-- Login Form -->
            <div class="bg-white/10 backdrop-blur-md rounded-2xl shadow-xl border border-white/20 p-8">
                <h2 class="text-2xl font-bold text-center text-white mb-8">Giriş Yap</h2>
                
                <form id="loginForm" class="space-y-6">
                    <!-- Username/Email Input -->
                    <div>
                        <label for="username" class="block text-sm font-medium text-slate-300 mb-2">
                            Kullanıcı Adı veya E-posta
                        </label>
                        <div class="relative">
                            <input 
                                type="text" 
                                id="username" 
                                name="username"
                                class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all duration-200"
                                placeholder="kullanici@example.com"
                                required
                            >
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-300 mb-2">
                            Şifre
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                name="password"
                                class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all duration-200 pr-12"
                                placeholder="••••••••"
                                required
                            >
                            <button 
                                type="button" 
                                id="togglePassword"
                                class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-white transition-colors"
                            >
                                <svg id="eyeIcon" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" id="rememberMe" class="rounded border-white/20 bg-white/5 text-purple-500 focus:ring-purple-500 focus:ring-offset-0">
                            <span class="ml-2 text-sm text-slate-300">Beni hatırla</span>
                        </label>
                        <a href="#" id="forgotPasswordLink" class="text-sm text-purple-400 hover:text-purple-300 transition-colors">
                            Şifremi unuttum
                        </a>
                    </div>

                    <!-- Login Button -->
                    <button 
                        type="submit" 
                        class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold py-3 px-4 rounded-xl hover:from-purple-600 hover:to-pink-600 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 focus:ring-offset-slate-900 transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]"
                    >
                        <span id="loginButtonText">Giriş Yap</span>
                        <div id="loginSpinner" class="hidden inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin ml-2"></div>
                    </button>

                    <!-- Divider -->
                    <div class="relative my-6">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-white/20"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-4 bg-transparent text-slate-400">veya</span>
                        </div>
                    </div>

                    <!-- google OAuth Button -->
                    <button 
                        type="button" 
                        id="oauthGoogleButton"
                        class="w-full bg-white/5 border border-white/20 text-white font-medium py-3 px-4 rounded-xl hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-white/20 transition-all duration-200 flex items-center justify-center space-x-2"
                    >
                        <div class="w-5 h-5 bg-white rounded text-slate-900 flex items-center justify-center text-xs font-bold">G</div>
                        <span>Google ile Giriş Yap</span>
                    </button>
                </form>

                <!-- Register Link -->
                <div class="mt-8 text-center">
                    <p class="text-slate-400">
                        Henüz hesabınız yok mu? 
                        <a href="#" id="registerLink" class="text-purple-400 hover:text-purple-300 font-medium transition-colors">
                            Kayıt Ol
                        </a>
                    </p>
                </div>
            </div>

            <!-- Error/Success Messages -->
            <div id="messageContainer" class="mt-4 hidden">
                <div id="messageContent" class="p-4 rounded-xl backdrop-blur-md border text-center">
                    <p id="messageText"></p>
                </div>
            </div>
        </div>
    </div>
    <script>
           
    </script>
