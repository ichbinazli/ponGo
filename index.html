<body>

    <!-- Menu Page -->
    <div id="menuPage" class="page active">
        <div class="menu-container">
            <h1 class="game-title">PING PONG</h1>
            <p class="subtitle">Choose Your Game Mode</p>
            
            <div class="cards-grid">
                <div class="game-card" id="aiCard">
                    <div class="card-icon">🤖</div>
                    <h2>Play vs AI</h2>
                    <p>Challenge the computer</p>
                    <div class="card-footer">
                        <span class="difficulty-badge">Easy • Medium • Hard</span>
                    </div>
                </div>

                <div class="game-card" id="h2hCard">
                    <div class="card-icon">👥</div>
                    <h2>Play vs Human</h2>
                    <p>Local multiplayer mode</p>
                    <div class="card-footer">
                        <span class="difficulty-badge">1 vs 1</span>
                    </div>
                </div>

                <div class="game-card" id="tournamentCard">
                    <div class="card-icon">🏆</div>
                    <h2>Tournament</h2>
                    <p>Compete in tournament mode</p>
                    <div class="card-footer">
                        <span class="difficulty-badge">3 - 6 Players</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./dist/main.js" type="module"></script>
</body>
