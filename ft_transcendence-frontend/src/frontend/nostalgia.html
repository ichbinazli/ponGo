<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            font-family: Arial, sans-serif;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            touch-action: none;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        #info h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #4a9eff;
        }

        #info p {
            margin: 5px 0;
            line-height: 1.5;
        }

        #loadingIndicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            text-align: center;
            z-index: 99;
        }

        #resetCameraButton {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 120;
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border: 0;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            background: rgba(17, 50, 97, 0.9);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
            cursor: pointer;
        }

        #resetCameraButton:hover {
            background: rgba(34, 52, 78, 0.95);
        }

        #resetCameraButton.is-visible {
            display: inline-flex;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #4a9eff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <button id="resetCameraButton" type="button" data-i18n="nostalgia.resetCamera">Başlangıç noktasına dön</button>

    <div id="loadingIndicator">
        <div class="spinner"></div>
        <p data-i18n="nostalgia.loading">Loading 3D Pong...</p>
    </div>
</body>
</html>
