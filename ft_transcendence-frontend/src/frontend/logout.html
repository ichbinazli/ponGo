<div class="card animate-fade-in text-center">
    <h1 class="text-3xl md:text-4xl font-bold text-white mb-8 text-shadow" data-i18n="logout.title">
        👋 Çıkış Yap
    </h1>
    
    <div class="max-w-md mx-auto">
        <div class="stat-card mb-8">
            <h2 class="text-xl font-bold text-white mb-4" data-i18n="logout.confirm">Çıkış yapmak istediğinizden emin misiniz?</h2>
            <p class="text-white/80 mb-6" data-i18n="logout.description">Hesabınızdan çıkış yapacaksınız ve giriş sayfasına yönlendirileceksiniz.</p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button class="btn bg-red-600 hover:bg-red-700" id="logout-confirm" data-i18n="logout.yes">
                    🚪 Yes, Logout
                </button>
                <a href="/" data-route="home" class="btn btn-secondary" data-i18n="logout.cancel">
                    ❌ İptal
                </a>
            </div>
        </div>
        
        <div class="text-white/60 text-sm">
            <p data-i18n="logout.saveNote">Oyun ilerlemeniz ve ayarlarınız kaydedilecektir.</p>
        </div>
    </div>
</div>
