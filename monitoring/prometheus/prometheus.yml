# ───────────────────────────────────────────────────────
# Prometheus Configuration - ft_transcendence
# ───────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    project: 'ft_transcendence'
    environment: 'production'

# Alert rules
rule_files:
  - "alert.rules.yml"

# Alertmanager bağlantısı (opsiyonel)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ─────────────────────────────────────────────
# Scrape Konfigürasyonları
# ─────────────────────────────────────────────
scrape_configs:

  # Prometheus kendisi
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Host sistem metrikleri (Node Exporter)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'host-system'

  # Docker container metrikleri (cAdvisor)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'docker-containers'

  # Backend servisi (Fastify /metrics endpoint)
  - job_name: 'backend'
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:3000']
        labels:
          service: 'backend'
          type: 'api'

  # Nginx metrikleri (nginx-prometheus-exporter)
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx-exporter:9113']
  #       labels:
  #         service: 'nginx'

  # Elasticsearch metrikleri
  - job_name: 'elasticsearch'
    metrics_path: '/_prometheus/metrics'
    static_configs:
      - targets: ['elasticsearch:9200']
        labels:
          service: 'elasticsearch'

  # Microservisler - Auth Service
  - job_name: 'auth-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auth-service:3001']
        labels:
          service: 'auth-service'
          type: 'microservice'

  # Microservisler - User Service
  - job_name: 'user-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['user-service:3002']
        labels:
          service: 'user-service'
          type: 'microservice'

  # Microservisler - Game Service
  - job_name: 'game-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['game-service:3003']
        labels:
          service: 'game-service'
          type: 'microservice'
