worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log formatı - JSON (Filebeat için)
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":"$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"service":"nginx"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Mikroservisler
    upstream auth-service {
        server auth-service:3001;
        keepalive 16;
    }

    upstream user-service {
        server user-service:3002;
        keepalive 16;
    }

    upstream game-service {
        server game-service:3003;
        keepalive 16;
    }

    # Legacy backend (geçiş süreci için)
    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    # feature-game: frontend + game (HTTPS üzerinde çalışıyor)
    upstream game {
        server game:5173;
        keepalive 32;
    }

    # ─────────────────────────────────────────────
    # HTTP → HTTPS yönlendirme
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # ─────────────────────────────────────────────
    # HTTPS - Ana Sunucu
    # ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;

        # SSL sertifikaları
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Güvenlik başlıkları
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ──────────────────────────────────────
        # Uploads (avatarlar vb.) → Backend
        # ──────────────────────────────────────
        location /uploads {
            proxy_pass https://backend;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ──────────────────────────────────────
        # API Rotaları → Backend
        # ──────────────────────────────────────
        location /api {
            limit_req zone=api burst=20 nodelay;

            proxy_pass https://backend;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
        }

        # Auth rotaları - daha sıkı rate limit
        location /api/auth {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass https://backend;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            proxy_pass https://backend/health;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
        }

        # ──────────────────────────────────────
        # WebSocket desteği (oyun için)
        # ──────────────────────────────────────
        location /ws/ {
            proxy_pass https://backend;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ──────────────────────────────────────
        # Frontend (genel trafik)
        # ──────────────────────────────────────
        location / {
            proxy_pass https://game;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Vue/Vite SPA fallback 
            proxy_intercept_errors on;
            error_page 404 =200 /;
        }
    }
}
